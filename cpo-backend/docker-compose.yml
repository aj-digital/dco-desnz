version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: cpo-postgres
    environment:
      POSTGRES_USER: cpouser
      POSTGRES_PASSWORD: cpopassword
      POSTGRES_DB: cpodb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata:
